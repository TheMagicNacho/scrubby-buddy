name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Frontend: lint and format ────────────────────────────────────────────────
  frontend-check:
    name: Frontend – Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npx oxlint src/

      - name: Format check (oxfmt)
        run: npx oxfmt --check src/ svelte.config.js vite.config.js

  # ── Backend: format and lint ────────────────────────────────────────────────
  backend-check:
    name: Backend – Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check (rustfmt)
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Lint (clippy)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  # ── SBOM: generate CycloneDX artifact ───────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cdxgen --output sbom.json --spec-version 1.6

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error

  # ── Security: dependency vulnerability scanning ──────────────────────────────
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: JS dependency audit
        run: npm audit --audit-level=moderate

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Rust dependency audit
        run: cargo audit --file src-tauri/Cargo.lock
